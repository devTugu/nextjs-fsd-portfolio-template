name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: node scripts/verify-lightningcss.js

      - run: npm run lint

      - run: npm run typecheck

      - run: npm run test

      - run: npm audit --audit-level=high
        continue-on-error: true

      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'pull_request'

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: app_db
          MYSQL_USER: app_user
          MYSQL_PASSWORD: app_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      CI: true
      API_INTERNAL_URL: http://localhost:3001/api/v1
      E2E_ADMIN_EMAIL: admin@example.com
      E2E_ADMIN_PASSWORD: Admin123!
      E2E_VIEWER_EMAIL: viewer@example.com
      E2E_VIEWER_PASSWORD: Viewer123!
      MFA_REQUIRED_ROLES: ''

    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: devTugu/nestjs-fsd-portfolio-template
          path: api
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install API dependencies
        working-directory: api
        run: npm ci

      - name: Configure API environment
        working-directory: api
        run: |
          cat > .env <<'EOF'
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_USERNAME=app_user
          DB_PASSWORD=app_password
          DB_NAME=app_db
          NODE_ENV=production
          APP_PORT=3001
          JWT_ACCESS_SECRET=ci_access_secret_minimum_32_characters
          JWT_REFRESH_SECRET=ci_refresh_secret_minimum_32_chars
          JWT_ACCESS_EXPIRES_IN=15m
          JWT_REFRESH_EXPIRES_IN=7d
          CORS_ORIGIN=http://localhost:3000
          THROTTLE_TTL=60
          THROTTLE_LIMIT=1000
          SWAGGER_ENABLED=false
          REDIS_ENABLED=true
          REDIS_URL=redis://127.0.0.1:6379
          PERMISSION_CACHE_TTL_SEC=60
          OTEL_ENABLED=false
          LOG_LEVEL=error
          SEED_ADMIN_EMAIL=admin@example.com
          SEED_ADMIN_PASSWORD=Admin123!
          SEED_VIEWER_EMAIL=viewer@example.com
          SEED_VIEWER_PASSWORD=Viewer123!
          MFA_REQUIRED_ROLES=
          MFA_ENCRYPTION_KEY=ci_mfa_encryption_key_minimum_32_chars
          EOF

      - name: Build API
        working-directory: api
        run: npm run build

      - name: Migrate and seed API
        working-directory: api
        run: |
          for attempt in $(seq 1 30); do
            if npm run migration:run; then
              break
            fi
            if [[ "${attempt}" -eq 30 ]]; then
              echo "Database migrations failed"
              exit 1
            fi
            sleep 2
          done
          npm run seed

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - run: npm run build

      - name: Run E2E
        run: bash scripts/ci-e2e.sh
